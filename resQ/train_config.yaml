# ─────────────────────────────────────────────────────────────────────────────
# train_config.yaml
# ResqAI Hybrid Fine-tuning Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  name: "google/gemma-4-e2b-it"
  max_seq_length: 2048
  dtype: null                    # null = auto-detect (float16 on T4, bfloat16 on Ampere+)
  load_in_4bit: true             # QLoRA: 4-bit base model quantization

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora:
  r: 16                          # LoRA rank — higher = more capacity, more VRAM
  lora_alpha: 16                 # Scaling factor (alpha/r = 1.0 is standard)
  lora_dropout: 0                # 0 = no dropout (Unsloth recommendation for speed)
  bias: "none"                   # No bias training
  use_gradient_checkpointing: "unsloth"  # Unsloth's optimized gradient checkpointing
  random_state: 42
  use_rslora: false              # Rank-stabilized LoRA (optional, slightly better)
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# ── Dataset ───────────────────────────────────────────────────────────────────
dataset:
  # Raw inputs
  resqai_json: "resqai_dataset.json"
  medqa_train: "phrases_no_exclude_train.jsonl"
  medqa_test:  "phrases_no_exclude_test.jsonl"

  # Processed outputs (generated by preprocess_medqa.py + combine_datasets.py)
  hybrid_train: "datasets/hybrid_train.jsonl"
  hybrid_eval:  "datasets/hybrid_eval.jsonl"
  statistics:   "datasets/dataset_statistics.json"

  # Composition targets
  synthetic_ratio: 0.50          # 50% synthetic emergency triage
  medqa_ratio: 0.35              # 35% converted MedQA reasoning
  augmented_ratio: 0.15          # 15% augmented examples

  eval_ratio: 0.10               # 10% held out for evaluation
  seed: 42

# ── System Prompt ─────────────────────────────────────────────────────────────
system_prompt: >
  You are ResqAI, an emergency first-aid assistant.
  Always respond ONLY with structured JSON emergency triage output.
  Prioritize immediate stabilization and medically safe first-aid guidance.
  Be concise, calm, and decisive.
  Respond in the same language as the user.

# ── Training Arguments ────────────────────────────────────────────────────────
training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4   # Effective batch size = 2 * 4 = 8
  warmup_steps: 10
  num_train_epochs: 3
  learning_rate: 2.0e-4
  weight_decay: 0.01
  optim: "adamw_8bit"              # 8-bit Adam for memory efficiency
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  load_best_model_at_end: true
  report_to: "none"                # Set to "wandb" if you want experiment tracking
  output_dir: "/kaggle/working/resqai-checkpoints"
  seed: 42

  # Precision — auto-selected based on GPU capability
  # T4 (Kaggle free): fp16=true, bf16=false
  # A100/H100: fp16=false, bf16=true
  fp16: auto                       # Resolved at runtime: not torch.cuda.is_bf16_supported()
  bf16: auto                       # Resolved at runtime: torch.cuda.is_bf16_supported()

  # SFT-specific
  dataset_text_field: "text"
  max_seq_length: 2048
  dataset_num_proc: 2
  packing: false                   # Sequence packing disabled for stability

# ── Export ────────────────────────────────────────────────────────────────────
export:
  output_dir: "./exported_model"
  gguf_quantization: "q4_k_m"     # Best balance of quality and size for Ollama
  lora_adapter_dir: "./exported_model/lora_adapter"
  merged_model_dir: "./exported_model/merged_model"

# ── HuggingFace Hub ───────────────────────────────────────────────────────────
hub:
  username: "YOUR_USERNAME"        # Replace with your HuggingFace username
  gguf_repo: "resqai-gemma-e2b"
  lora_repo: "resqai-gemma-e2b-lora"
  # Token is read from Kaggle secrets (key: HF_TOKEN) or HF_TOKEN env var

# ── Inference ─────────────────────────────────────────────────────────────────
inference:
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  repetition_penalty: 1.1
  max_new_tokens: 512
  do_sample: true

# ── Safety ────────────────────────────────────────────────────────────────────
safety:
  # Patterns that trigger fallback response
  dangerous_patterns:
    - "\\d+\\s*mg\\b"
    - "\\d+\\s*mcg\\b"
    - "\\d+\\s*ml\\b"
    - "\\d+\\s*units?\\b"
    - "\\d+\\s*tablets?\\b"
  fallback_severity: "high"
  fallback_call_ambulance: true
